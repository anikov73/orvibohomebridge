name: 自动打包

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-docker-pkg:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 打包 Docker 部署文件
        run: |
          mkdir -p docker-pkg/core docker-pkg/templates docker-pkg/device_catalog docker-pkg/certs
          cp Dockerfile docker-compose.yml requirements-docker.txt install_list_app.py docker-pkg/
          cp core/*.py docker-pkg/core/
          cp templates/*.html docker-pkg/templates/
          cp certs/*.pem docker-pkg/certs/
          cp device_catalog.json docker-pkg/device_catalog/all_devices_raw.json
          zip -r docker-deploy.zip docker-pkg/

      - name: 上传 Docker 部署包
        uses: actions/upload-artifact@v4
        with:
          name: docker-deploy
          path: docker-deploy.zip
          if-no-files-found: error

  build-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-release:
    needs: [build-docker-pkg]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/docker-deploy/docker-deploy.zip
          generate_release_notes: true
